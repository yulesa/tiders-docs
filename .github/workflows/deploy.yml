name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Checkout tiders-core
        uses: actions/checkout@v4
        with:
          repository: yulesa/tiders-core
          path: _repos/tiders-core

      - name: Checkout tiders-rpc-client
        uses: actions/checkout@v4
        with:
          repository: yulesa/tiders-rpc-client
          path: _repos/tiders-rpc-client

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      # Build mdBook (narrative docs)
      - name: Build mdBook
        run: mdbook build

      # Build rustdoc for tiders-core (all workspace crates)
      - name: Build tiders-core rustdoc
        working-directory: _repos/tiders-core
        run: cargo doc --no-deps --workspace --exclude tiders-core-python

      # Build rustdoc for tiders-rpc-client
      - name: Build tiders-rpc-client rustdoc
        working-directory: _repos/tiders-rpc-client/rust
        run: cargo doc --no-deps

      # Assemble: copy rustdoc output into site/api/
      - name: Assemble site
        run: |
          mkdir -p site/api
          cp -r _repos/tiders-core/target/doc/* site/api/
          cp -r _repos/tiders-rpc-client/rust/target/doc/* site/api/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
